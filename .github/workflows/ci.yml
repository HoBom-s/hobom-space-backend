name: CI

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests with coverage
        run: >
          dotnet test --no-build --configuration Release --verbosity normal
          --filter "Category!=Integration"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Integration tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Integration"

      - name: Coverage report
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: TestResults/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '80 90'
          hide_complexity: true
          indicators: true

      - name: Add coverage to PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 14

      - name: Check pending migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef migrations has-pending-model-changes --project src/HobomSpace.Infrastructure --startup-project src/HobomSpace.Api --no-build --configuration Release

      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore
